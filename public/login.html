<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LuxMenu · Entrar</title>
<link rel="stylesheet" href="login.css">

<div class="card">
    <p class="logo">LuxMenu</p>
    <p class="sub">Ferramentas de Suporte Fiscal</p>
    <form id="form">
        <label for="username">Usuário</label>
        <input id="username" type="text" autocomplete="username" autofocus placeholder="seu.usuario">
        <label for="senha">Senha</label>
        <input id="senha" type="password" autocomplete="current-password" placeholder="••••••••">
        <button id="btn" type="submit">Entrar</button>
        <p class="erro" id="erro"></p>
    </form>
</div>

<script src="login.js"></script>
