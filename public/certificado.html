<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Extração de Certificado · LuxMenu</title>
<link rel="stylesheet" href="shared.css">
<style>
    .drop-area {
        border: 2px dashed var(--rule-strong);
        border-radius: 14px;
        padding: 40px 20px;
        text-align: center;
        cursor: pointer;
        transition: border-color .2s, background .2s;
        background: var(--card);
    }
    .drop-area:hover, .drop-area.over { border-color: var(--stamp); background: var(--rule); }
    .drop-area .ic { font-size: 36px; display: block; margin-bottom: 8px; }
    .drop-area p { margin: 0; color: var(--ink-soft); font-size: 14px; }
    .drop-area .nome-arquivo { font-weight: 650; color: var(--stamp); margin-top: 6px; font-size: 13.5px; }

    .campo-senha { margin-top: 16px; }
    .campo-senha label { font-size: 12px; font-weight: 600; color: var(--ink-soft); display: block; margin-bottom: 5px; }
    .campo-senha input {
        width: 100%; border: 1px solid var(--rule-strong); border-radius: 9px;
        padding: 10px 13px; font-size: 14px; background: var(--card); color: var(--ink); outline: none;
    }
    .campo-senha input:focus { border-color: var(--stamp); box-shadow: 0 0 0 3px rgba(35,70,83,.1); }

    .btn-extrair {
        width: 100%; margin-top: 16px; padding: 12px;
        background: var(--stamp); color: #fff; border: none;
        border-radius: 9px; font-size: 15px; font-weight: 600; cursor: pointer;
        transition: opacity .15s;
    }
    .btn-extrair:hover { opacity: .88; }
    .btn-extrair:disabled { opacity: .45; cursor: default; }

    .erro { color: #9A3B22; font-size: 13.5px; margin-top: 10px; padding: 10px 14px;
            background: #fdf0ec; border-radius: 8px; display: none; }

    .resultado { margin-top: 24px; display: none; }

    .cert-info {
        background: var(--card); border: 1px solid var(--rule); border-radius: 12px;
        padding: 16px 20px; margin-bottom: 20px;
    }
    .cert-info h2 { font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
                    color: var(--ink-faint); font-weight: 600; margin: 0 0 12px; }
    .cert-linha { display: flex; gap: 8px; font-size: 13.5px; margin-bottom: 6px; }
    .cert-linha:last-child { margin-bottom: 0; }
    .cert-label { color: var(--ink-faint); flex: 0 0 90px; font-size: 12px; padding-top: 1px; }
    .cert-val { color: var(--ink); font-weight: 500; word-break: break-all; }
    .cert-val.exp-ok  { color: #0F7A52; }
    .cert-val.exp-venc { color: #9A3B22; }

    .arquivos-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    @media(max-width:620px) { .arquivos-grid { grid-template-columns: 1fr; } }

    .arquivo-card {
        background: var(--card); border: 1px solid var(--rule);
        border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 10px;
    }
    .arquivo-card h3 { font-size: 13px; font-weight: 650; margin: 0; color: var(--stamp); font-family: var(--mono); }
    .arquivo-card p  { font-size: 12px; color: var(--ink-soft); margin: 0; }

    .btn-baixar {
        display: block; width: 100%; padding: 9px;
        background: var(--stamp); color: #fff; border: none;
        border-radius: 8px; font-size: 13px; font-weight: 600;
        cursor: pointer; text-align: center; text-decoration: none;
        transition: opacity .15s;
    }
    .btn-baixar:hover { opacity: .85; }

    .btn-copiar {
        display: block; width: 100%; padding: 7px;
        border: 1px solid var(--rule-strong); background: var(--card);
        color: var(--ink-soft); border-radius: 8px; font-size: 12px;
        cursor: pointer; transition: border-color .15s, color .15s;
    }
    .btn-copiar:hover { border-color: var(--stamp); color: var(--stamp); }
    .btn-copiar.ok    { border-color: #0F7A52; color: #0F7A52; }
</style>

<div class="wrap">
    <a class="backnav" href="index.html">← Menu</a>
    <p class="eyebrow">Fiscal · Certificado Digital</p>
    <h1>Extração de Certificado</h1>
    <p class="sub">Selecione o arquivo <strong>.pfx</strong> e informe a senha para gerar os arquivos <strong>.pem</strong>, <strong>.crt</strong> e <strong>.key</strong> prontos para uso.</p>

    <div class="card">
        <div class="drop-area" id="dropArea">
            <span class="ic">🔐</span>
            <p>Arraste o arquivo <strong>.pfx</strong> aqui ou clique para selecionar</p>
            <p class="nome-arquivo" id="nomeArquivo" style="display:none"></p>
            <input type="file" id="inputArquivo" accept=".pfx,.p12" style="display:none">
        </div>

        <div class="campo-senha">
            <label for="senha">Senha do certificado</label>
            <input type="password" id="senha" placeholder="••••••••" autocomplete="off">
        </div>

        <button class="btn-extrair" id="btnExtrair" disabled>Extrair arquivos</button>
        <div class="erro" id="msgErro"></div>
    </div>

    <div class="resultado" id="resultado">
        <div class="cert-info card" id="certInfo"></div>
        <div class="arquivos-grid" id="arquivosGrid"></div>
    </div>

    <footer>extração local · o certificado não sai desta máquina</footer>
</div>

<script src="shared.js"></script>
<script src="forge.min.js"></script>
<script src="certificado.js"></script>
