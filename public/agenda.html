<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agenda</title>
<link rel="stylesheet" href="shared.css">
<style>
    body {
        padding-top: 6px;
    }

    .wrap {
        max-width: 1320px;
        padding-bottom: 22px;
    }

    h1 {
        margin-bottom: 6px;
    }

    .agenda-tabs {
        position: fixed;
        top: 18px;
        right: 124px;
        z-index: 999;
        display: flex;
        border: 1px solid var(--rule-strong);
        border-radius: 9px;
        overflow: hidden;
        background: var(--card);
    }

    .agenda-tab {
        display: flex;
        align-items: center;
        gap: 6px;
        border: 0;
        background: var(--card);
        color: var(--ink-soft);
        padding: 8px 14px;
        font-size: 12.5px;
        font-family: var(--sans);
        cursor: pointer;
    }

    .agenda-tab + .agenda-tab {
        border-left: 1px solid var(--rule-strong);
    }

    .agenda-tab .ic {
        font-size: 14px;
    }

    .agenda-tab:hover {
        color: var(--stamp);
    }

    .agenda-tab.active {
        background: var(--stamp);
        color: #fff;
    }

    .card + .card {
        margin-top: 16px;
    }

    .cal-card,
    .tarefas-board-card {
        padding: 16px;
    }

    .cal-card h2,
    .tarefas-board-card h2 {
        font-size: 11px;
        letter-spacing: .16em;
        text-transform: uppercase;
        color: var(--ink-faint);
        font-weight: 600;
        margin: 0 0 8px;
    }

    .cal-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
    }

    .cal-titulo {
        flex: 1;
        font-size: 14px;
        font-weight: 650;
        color: var(--ink);
        text-align: center;
        text-transform: capitalize;
    }

    .navbtn {
        border: 1px solid var(--rule-strong);
        background: var(--card);
        color: var(--ink-soft);
        border-radius: 7px;
        width: 30px;
        height: 30px;
        font-size: 14px;
        cursor: pointer;
    }

    .navbtn:hover {
        border-color: var(--stamp);
        color: var(--stamp);
    }

    .btn {
        border: 1px solid var(--stamp);
        background: var(--stamp);
        color: #fff;
        border-radius: 7px;
        padding: 6px 12px;
        font-size: 12.5px;
        cursor: pointer;
    }

    .btn:hover {
        opacity: .9;
    }

    .btn.secundario {
        border-color: var(--rule-strong);
        background: var(--card);
        color: var(--ink-soft);
    }

    .btn.perigo {
        border-color: #9A3B22;
        background: #9A3B22;
    }

    .cal-grid-scroll {
        overflow-x: auto;
    }

    .cal-grid {
        display: grid;
        grid-template-columns: 52px repeat(7, minmax(96px, 1fr));
        min-width: 760px;
    }

    .cal-corner {
        border-bottom: 1px solid var(--rule);
    }

    .cal-day-head {
        text-align: center;
        font-size: 11px;
        padding: 4px 2px 8px;
        border-bottom: 1px solid var(--rule);
        color: var(--ink-soft);
    }

    .cal-day-head .dnum {
        font-size: 15px;
        font-weight: 650;
        color: var(--ink);
        margin-top: 2px;
    }

    .cal-day-head.hoje {
        color: var(--stamp);
    }

    .cal-day-head.hoje .dnum {
        color: var(--stamp);
    }

    .cal-hours {
        position: relative;
    }

    .cal-hour-label {
        height: 44px;
        font-size: 10.5px;
        color: var(--ink-faint);
        font-family: var(--mono);
        padding-right: 6px;
        text-align: right;
        transform: translateY(-6px);
    }

    .cal-day-col {
        position: relative;
        border-left: 1px solid var(--rule);
        background-image: repeating-linear-gradient(to bottom, var(--rule) 0, var(--rule) 1px, transparent 1px, transparent 44px);
        cursor: pointer;
    }

    .cal-day-col.hoje {
        background-color: var(--recolher-bg);
    }

    .compromisso {
        position: absolute;
        border-radius: 6px;
        padding: 3px 6px;
        font-size: 11px;
        line-height: 1.25;
        color: #fff;
        overflow: hidden;
        cursor: pointer;
        box-shadow: 0 1px 3px rgba(0, 0, 0, .25);
    }

    .compromisso .hora {
        font-family: var(--mono);
        font-size: 9.5px;
        opacity: .85;
        display: block;
    }

    .board-scroll-sync {
        position: fixed;
        left: 50%;
        bottom: 0;
        transform: translateX(-50%);
        width: min(1320px, 100% - 36px);
        overflow-x: auto;
        overflow-y: hidden;
        height: 16px;
        padding-top: 2px;
        background: var(--paper);
        border-top: 1px solid var(--rule);
        z-index: 500;
        scrollbar-color: var(--rule-strong) var(--paper);
    }

    .board-scroll-sync #boardScrollSyncTrack {
        height: 1px;
    }

    .board-scroll-sync::-webkit-scrollbar {
        height: 10px;
    }

    .board-scroll-sync::-webkit-scrollbar-track {
        background: var(--paper);
        border-radius: 8px;
    }

    .board-scroll-sync::-webkit-scrollbar-thumb {
        background: var(--rule-strong);
        border-radius: 8px;
    }

    .board-scroll-sync::-webkit-scrollbar-thumb:hover {
        background: var(--stamp);
    }

    .tarefas-board {
        display: flex;
        align-items: flex-start;
        gap: 14px;
        overflow-x: auto;
        padding-bottom: 6px;
        scrollbar-width: none;
    }

    .tarefas-board::-webkit-scrollbar {
        display: none;
    }

    .coluna-pessoa {
        flex: 0 0 330px;
        min-width: 330px;
        background: var(--paper);
        border: 1px solid var(--rule);
        border-radius: 10px;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .coluna-head {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 14.5px;
        font-weight: 650;
        color: var(--ink);
    }

    .coluna-head .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        flex: 0 0 auto;
    }

    .btn-add-tarefa {
        border: 1px dashed var(--rule-strong);
        background: none;
        color: var(--ink-soft);
        border-radius: 7px;
        padding: 8px 10px;
        font-size: 13px;
        font-family: var(--sans);
        cursor: pointer;
        text-align: left;
    }

    .btn-add-tarefa:hover {
        border-color: var(--stamp);
        color: var(--stamp);
    }

    .add-tarefa-rapida {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .add-tarefa-rapida[hidden] {
        display: none;
    }

    .add-tarefa-acoes {
        display: flex;
        gap: 6px;
    }

    .add-tarefa-acoes button {
        flex: 1;
        padding: 7px;
        font-size: 12.5px;
    }

    .add-tarefa-rapida .linha-data-hora {
        display: flex;
        gap: 6px;
    }

    .add-tarefa-rapida input[type="text"] {
        width: 100%;
    }

    .add-tarefa-rapida .linha-data-hora input {
        flex: 1;
        min-width: 0;
    }

    .add-tarefa-rapida input {
        border: 1px solid var(--rule-strong);
        border-radius: 7px;
        padding: 8px 10px;
        font-size: 13.5px;
        font-family: var(--sans);
    }

    .add-tarefa-rapida input[type="date"],
    .add-tarefa-rapida input[type="time"] {
        padding: 7px 6px;
        font-size: 12px;
    }

    .coluna-lista {
        display: flex;
        flex-direction: column;
        gap: 3px;
    }

    .coluna-concluidas-lista {
        margin-top: 4px;
    }

    .item-compromisso {
        display: flex;
        flex-direction: column;
        gap: 1px;
        padding: 5px 7px;
        border-left: 3px solid var(--stamp);
        border-radius: 4px;
        background: var(--card);
        cursor: pointer;
        font-size: 12px;
    }

    .item-compromisso:hover {
        border-left-color: var(--diferido);
    }

    .item-compromisso .hora {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--ink-faint);
    }

    .coluna-concluidas summary {
        font-size: 10.5px;
        color: var(--ink-faint);
        cursor: pointer;
        margin-top: 2px;
    }

    .tarefa-linha {
        display: flex;
        flex-direction: column;
        gap: 3px;
        padding: 6px;
        font-size: 13.5px;
        border-radius: 7px;
    }

    .tarefa-linha:hover {
        background: var(--card);
    }

    .tarefa-principal {
        display: flex;
        align-items: flex-start;
        gap: 8px;
    }

    .tarefa-check {
        appearance: none;
        -webkit-appearance: none;
        width: 18px;
        height: 18px;
        margin: 2px 0 0;
        border: 1.5px solid var(--rule-strong);
        border-radius: 50%;
        background: var(--card);
        flex: 0 0 auto;
        cursor: pointer;
        position: relative;
        transition: background .15s, border-color .15s;
    }

    .tarefa-check:hover {
        border-color: var(--stamp);
    }

    .tarefa-check:checked {
        background: var(--recolher);
        border-color: var(--recolher);
    }

    .tarefa-check:checked::after {
        content: "";
        position: absolute;
        left: 5px;
        top: 1px;
        width: 5px;
        height: 9px;
        border: solid #fff;
        border-width: 0 2px 2px 0;
        transform: rotate(45deg);
    }

    .tarefa-textos {
        display: flex;
        flex-direction: column;
        gap: 1px;
        flex: 1;
        min-width: 0;
    }

    .tarefa-linha .tit {
        font-weight: 600;
        white-space: normal;
        overflow-wrap: anywhere;
        line-height: 1.3;
    }

    .tarefa-desc {
        font-size: 12px;
        font-weight: 400;
        color: var(--ink-soft);
        white-space: normal;
        overflow-wrap: anywhere;
        line-height: 1.3;
    }

    .tarefa-linha.feita .tit,
    .tarefa-linha.feita .tarefa-desc {
        color: var(--ink-faint);
        text-decoration: line-through;
    }

    .tarefa-meta {
        display: flex;
        align-items: center;
        gap: 5px;
        flex-wrap: wrap;
        padding-left: 26px;
    }

    .tarefa-data {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--ink-faint);
        white-space: nowrap;
        margin-right: auto;
    }

    .tarefa-menu {
        position: relative;
        margin-left: auto;
    }

    .tarefa-menu summary {
        list-style: none;
        width: 22px;
        height: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        color: var(--ink-faint);
        font-size: 16px;
        cursor: pointer;
    }

    .tarefa-menu summary::-webkit-details-marker,
    .tarefa-menu summary::marker {
        display: none;
        content: "";
    }

    .tarefa-menu summary:hover {
        background: var(--rule);
        color: var(--ink-soft);
    }

    .tarefa-menu[open] summary {
        background: var(--rule);
        color: var(--stamp);
    }

    .tarefa-menu-painel {
        position: absolute;
        right: 0;
        top: 26px;
        background: var(--card);
        border: 1px solid var(--rule-strong);
        border-radius: 8px;
        box-shadow: var(--shadow);
        padding: 4px;
        min-width: 140px;
        z-index: 20;
    }

    .tarefa-menu-raiz,
    .tarefa-menu-pessoas {
        display: flex;
        flex-direction: column;
    }

    .tarefa-menu-raiz[hidden],
    .tarefa-menu-pessoas[hidden] {
        display: none;
    }

    .tarefa-menu-pessoas {
        max-height: 220px;
        overflow-y: auto;
    }

    .tarefa-menu-trocar,
    .tarefa-menu-excluir,
    .tarefa-menu-voltar,
    .tarefa-mover-opcao {
        border: 0;
        background: none;
        text-align: left;
        padding: 6px 8px;
        font-size: 12.5px;
        color: var(--ink);
        cursor: pointer;
        border-radius: 5px;
        font-family: var(--sans);
    }

    .tarefa-menu-voltar {
        color: var(--ink-faint);
        border-bottom: 1px solid var(--rule);
        margin-bottom: 2px;
        border-radius: 0;
    }

    .tarefa-menu-trocar:hover,
    .tarefa-menu-excluir:hover,
    .tarefa-mover-opcao:hover {
        background: var(--rule);
    }

    .tarefa-menu-excluir {
        color: #9A3B22;
    }

    .vazio-grupo {
        font-size: 12px;
        color: var(--ink-faint);
    }

    .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, .4);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2000;
        padding: 16px;
    }

    .modal {
        background: var(--card);
        border-radius: 14px;
        box-shadow: var(--shadow);
        padding: 20px;
        width: 100%;
        max-width: 380px;
    }

    .modal h2 {
        font-size: 15px;
        margin: 0 0 14px;
        color: var(--ink);
    }

    .modal label {
        display: block;
        font-size: 11.5px;
        color: var(--ink-soft);
        margin: 10px 0 4px;
    }

    .modal input,
    .modal select,
    .modal textarea {
        width: 100%;
        border: 1px solid var(--rule-strong);
        border-radius: 7px;
        padding: 7px 9px;
        font-size: 13px;
        font-family: var(--sans);
    }

    .modal .linha2 {
        display: flex;
        gap: 8px;
    }

    .modal .linha2>div {
        flex: 1;
    }

    .modal-acoes {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 16px;
    }

    .modal-acoes .espaco {
        flex: 1;
    }
</style>

<div class="wrap">
    <a class="backnav" href="index.html">← Menu</a>
    <h1>Agenda</h1>

    <div class="agenda-tabs" id="agendaTabs">
        <button class="agenda-tab active" data-painel="painelTarefas"><span class="ic">✓</span>Tarefas</button>
        <button class="agenda-tab" data-painel="painelCalendario"><span class="ic">📆</span>Calendário</button>
    </div>

    <div class="card tarefas-board-card" id="painelTarefas">
        <h2>Tarefas</h2>
        <div class="board-scroll-sync" id="boardScrollSync"><div id="boardScrollSyncTrack"></div></div>
        <div class="tarefas-board" id="tarefasBoard"></div>
    </div>

    <div class="card cal-card" id="painelCalendario" style="display:none">
        <h2>Calendário</h2>
        <div class="cal-header">
            <button class="navbtn" id="btnSemanaAnterior" title="Semana anterior">←</button>
            <div class="cal-titulo" id="tituloSemana"></div>
            <button class="btn secundario" id="btnHoje">Hoje</button>
            <button class="navbtn" id="btnSemanaSeguinte" title="Semana seguinte">→</button>
        </div>
        <div class="cal-grid-scroll">
            <div class="cal-grid" id="calGrid"></div>
        </div>
    </div>

    <footer>agenda compartilhada pela rede interna · LuxMenu</footer>
</div>

<div class="overlay" id="overlayCompromisso" style="display:none">
    <div class="modal">
        <h2 id="modalTitulo">Novo compromisso</h2>
        <form id="formCompromisso">
            <input type="hidden" id="compId">
            <label for="compTitulo">Título</label>
            <input type="text" id="compTitulo" required>

            <label for="compDescricao">Descrição (opcional)</label>
            <textarea id="compDescricao" rows="2"></textarea>

            <label for="compData">Data</label>
            <input type="date" id="compData" required>

            <div class="linha2">
                <div>
                    <label for="compHoraInicio">Início</label>
                    <input type="time" id="compHoraInicio" required>
                </div>
                <div>
                    <label for="compHoraFim">Fim</label>
                    <input type="time" id="compHoraFim" required>
                </div>
            </div>

            <label for="compPessoa">Responsável (opcional)</label>
            <select id="compPessoa">
                <option value="">Sem responsável</option>
            </select>

            <div class="modal-acoes">
                <button type="button" class="btn perigo" id="btnExcluirComp" style="display:none">Excluir</button>
                <span class="espaco"></span>
                <button type="button" class="btn secundario" id="btnCancelarComp">Cancelar</button>
                <button type="submit" class="btn">Salvar</button>
            </div>
        </form>
    </div>
</div>

<div class="overlay" id="overlayTarefa" style="display:none">
    <div class="modal">
        <h2>Editar tarefa</h2>
        <form id="formTarefaEditar">
            <input type="hidden" id="tarefaEditId">
            <label for="tarefaEditTitulo">Título</label>
            <input type="text" id="tarefaEditTitulo" required>

            <label for="tarefaEditDescricao">Detalhes (opcional)</label>
            <textarea id="tarefaEditDescricao" rows="2"></textarea>

            <div class="linha2">
                <div>
                    <label for="tarefaEditData">Data (opcional)</label>
                    <input type="date" id="tarefaEditData">
                </div>
                <div>
                    <label for="tarefaEditHora">Horário (opcional)</label>
                    <input type="time" id="tarefaEditHora">
                </div>
            </div>

            <label for="tarefaEditPessoa">Responsável</label>
            <select id="tarefaEditPessoa">
                <option value="">Geral</option>
            </select>

            <div class="modal-acoes">
                <button type="button" class="btn perigo" id="btnExcluirTarefaEdit">Excluir</button>
                <span class="espaco"></span>
                <button type="button" class="btn secundario" id="btnCancelarTarefaEdit">Cancelar</button>
                <button type="submit" class="btn">Salvar</button>
            </div>
        </form>
    </div>
</div>

<script src="shared.js"></script>
<script src="agenda.js"></script>
