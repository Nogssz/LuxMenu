<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chat · LuxMenu</title>
<link rel="stylesheet" href="shared.css">
<style>
    body { padding-bottom: 0; }
    .wrap { max-width: 860px; display: flex; flex-direction: column; height: 100vh; padding: 0; }

    .chat-header {
        padding: 18px 20px 14px;
        border-bottom: 1px solid var(--rule);
        display: flex; align-items: center; justify-content: space-between;
        flex-shrink: 0;
    }
    .chat-header h1 { font-size: 18px; margin: 0; }
    .online-lista { display: flex; gap: 6px; flex-wrap: wrap; }
    .online-chip {
        font-size: 11.5px; background: var(--rule); border-radius: 20px;
        padding: 3px 10px; color: var(--ink-soft);
        display: flex; align-items: center; gap: 5px;
    }
    .online-chip::before { content: ''; display: block; width: 7px; height: 7px;
                           border-radius: 50%; background: #2ea875; }

    .msgs {
        flex: 1; overflow-y: auto; padding: 16px 20px;
        display: flex; flex-direction: column; gap: 4px;
    }

    .msg { display: flex; flex-direction: column; max-width: 72%; }
    .msg.minha { align-self: flex-end; align-items: flex-end; }
    .msg.outro  { align-self: flex-start; }

    .msg-meta { font-size: 11px; color: var(--ink-faint); margin-bottom: 2px; }
    .msg.minha .msg-meta { text-align: right; }

    .msg-balao {
        padding: 8px 13px; border-radius: 14px; font-size: 14px; line-height: 1.45;
        word-break: break-word;
    }
    .msg.outro  .msg-balao { background: var(--card); border: 1px solid var(--rule); color: var(--ink); border-radius: 14px 14px 14px 3px; }
    .msg.minha  .msg-balao { background: var(--stamp); color: #fff; border-radius: 14px 14px 3px 14px; }

    .msg-sep { text-align: center; font-size: 11px; color: var(--ink-faint); margin: 10px 0 6px; }

    .chat-input {
        flex-shrink: 0; padding: 12px 20px 20px;
        border-top: 1px solid var(--rule);
        display: flex; gap: 8px;
    }
    .chat-input textarea {
        flex: 1; border: 1px solid var(--rule-strong); border-radius: 10px;
        padding: 10px 13px; font-size: 14px; font-family: var(--sans);
        background: var(--card); color: var(--ink); resize: none;
        height: 42px; max-height: 120px; outline: none; line-height: 1.4;
        overflow-y: hidden;
    }
    .chat-input textarea:focus { border-color: var(--stamp); box-shadow: 0 0 0 3px rgba(35,70,83,.1); }
    .chat-input button {
        border: none; background: var(--stamp); color: #fff;
        border-radius: 10px; padding: 0 18px; font-size: 18px;
        cursor: pointer; flex-shrink: 0; height: 42px;
    }
    .chat-input button:hover { opacity: .88; }
    .chat-input button:disabled { opacity: .4; }

    .vazio { text-align: center; color: var(--ink-faint); font-size: 13px; margin: auto; padding: 40px 0; }
</style>

<div class="wrap">
    <div class="chat-header">
        <div>
            <a class="backnav" href="index.html" style="margin:0 0 4px;display:block">← Menu</a>
            <h1>Chat da equipe</h1>
        </div>
        <div>
            <p style="font-size:11px;color:var(--ink-faint);margin:0 0 4px">Online agora</p>
            <div class="online-lista" id="online"></div>
        </div>
    </div>

    <div class="msgs" id="msgs">
        <p class="vazio" id="vazio">Nenhuma mensagem ainda. Diga olá! 👋</p>
    </div>

    <div class="chat-input">
        <textarea id="texto" placeholder="Mensagem…" rows="1"></textarea>
        <button id="btnEnviar" title="Enviar">↑</button>
    </div>
</div>

<script src="shared.js"></script>
<script type="module" src="chat.js"></script>
